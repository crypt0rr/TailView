name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      - working-directory: backend
        run: uv sync --frozen --extra dev
      - working-directory: backend
        run: uv run ruff check app tests
      - working-directory: backend
        run: uv run mypy app
      - working-directory: backend
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=64
      - name: Audit Python runtime dependencies
        working-directory: backend
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file /tmp/tailview-requirements.txt
          uvx --from pip-audit==2.9.0 pip-audit --require-hashes --requirement /tmp/tailview-requirements.txt

  migrations:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: tailview_migrations
          POSTGRES_USER: tailview
          POSTGRES_PASSWORD: migration-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tailview -d tailview_migrations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://tailview:migration-test-password@127.0.0.1:5432/tailview_migrations
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      - working-directory: backend
        run: uv sync --frozen --extra dev
      - name: Upgrade an empty PostgreSQL database
        working-directory: backend
        run: |
          uv run alembic upgrade head
          test "$(uv run alembic heads | awk '{print $1}')" = "$(uv run python -c 'from app.build_info import packaged_schema_heads; print(packaged_schema_heads()[0])')"
      - name: Rehearse the 0013 to current upgrade with preserved data
        working-directory: backend
        run: |
          PYTHONPATH=. uv run python tests/release_upgrade_check.py prepare
          uv run alembic upgrade head
          PYTHONPATH=. uv run python tests/release_upgrade_check.py verify

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build
      - working-directory: frontend
        run: npm audit --omit=dev

  containers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure smoke environment
        run: |
          cp .env.example .env
          sed -i 's/REPLACE-with-a-random-64-character-setup-token/ci-only-setup-token-00000000000000000000000000000000/' .env
          sed -i 's/REPLACE-with-a-long-random-database-password/ci-only-database-password/' .env
      - run: docker compose config --quiet
      - run: docker compose build
      - name: Start and check health
        run: |
          docker compose up -d
          timeout 120 sh -c 'until curl --fail --silent http://127.0.0.1:8080/health/ready; do sleep 2; done'
      - name: Verify an isolated backup restore drill
        run: |
          sh deploy/backup.sh /tmp/tailview-ci.dump
          sh deploy/verify-backup.sh /tmp/tailview-ci.dump
      - if: always()
        run: docker compose logs --no-color && docker compose down -v

  browser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure demo browser environment
        run: |
          cp .env.example .env
          sed -i 's/REPLACE-with-a-random-64-character-setup-token/ci-only-setup-token-00000000000000000000000000000000/' .env
          sed -i 's/REPLACE-with-a-long-random-database-password/ci-only-database-password/' .env
      - name: Run Playwright acceptance suite
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from e2e e2e
      - if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs --no-color && docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
