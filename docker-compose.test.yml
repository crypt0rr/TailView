services:
  database:
    container_name: tailview-test-postgres
  backend:
    container_name: tailview-test-api
    environment:
      ENVIRONMENT: test
      APP_URL: http://frontend:8080
      DEMO_MODE: "true"
      COOKIE_SECURE: "false"
  frontend:
    container_name: tailview-test-web
  caddy:
    container_name: tailview-test-proxy
  telemetry-agent:
    container_name: tailview-test-telemetry
  e2e:
    container_name: tailview-test-e2e
    build: {context: ./frontend, target: e2e}
    command: npm run test:e2e
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:8080
      E2E_SETUP_TOKEN: ${TAILVIEW_SETUP_TOKEN}
      E2E_USERNAME: e2e-admin
      E2E_PASSWORD: e2e-temporary-password-2026
    depends_on:
      frontend: {condition: service_healthy}
    networks: [app]
